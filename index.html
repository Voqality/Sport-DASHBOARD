<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Sport"/>
<meta name="theme-color" content="#07090f"/>
<title>Dashboard Sport</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#07090f;color:#e8edf5;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#243050;border-radius:10px}
button,input,textarea{font-family:inherit;cursor:pointer;outline:none}
textarea{resize:none}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:#07090f;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s ease,transform .6s ease}
#splash.hide{opacity:0;transform:scale(1.06);pointer-events:none}
.sp-logo{width:88px;height:88px;border-radius:22px;background:linear-gradient(135deg,#ff6b35,#ff4757);display:flex;align-items:center;justify-content:center;font-size:42px;box-shadow:0 0 50px #ff6b3555,0 0 100px #ff475730;animation:spPop .7s cubic-bezier(.175,.885,.32,1.275) both}
.sp-title{font-family:‘Barlow Condensed’,Arial;font-size:30px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin-top:18px;animation:spFade .5s .3s ease both}
.sp-sub{font-size:12px;color:#7a8fad;margin-top:5px;animation:spFade .5s .5s ease both}
.sp-bar{width:120px;height:2px;background:#1a2438;border-radius:2px;margin-top:30px;overflow:hidden;animation:spFade .5s .4s ease both}
.sp-fill{height:100%;background:linear-gradient(90deg,#ff6b35,#00d4ff);animation:spLoad 1.4s .4s ease-out both}
@keyframes spPop{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
@keyframes spFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spLoad{from{width:0}to{width:100%}}

/* AMBIENT */
.ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.06}

/* ANIMATIONS */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes barIn{from{width:0}to{width:var(–w,0%)}}
.slide-up{animation:slideUp .35s cubic-bezier(.2,.8,.2,1) both}
.fade-in{animation:fadeIn .3s ease both}
.float{animation:float 3s ease-in-out infinite}
.pulse{animation:pulse 2s infinite}

/* LAYOUT */
#app{position:relative;z-index:1;min-height:100vh}
.header{position:sticky;top:0;z-index:100;background:rgba(7,9,15,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.05);padding:12px 16px 0}
.header-inner{max-width:1100px;margin:0 auto}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;gap:0}
.tabs::-webkit-scrollbar{display:none}
.tab{background:transparent;color:#334060;border-top:2px solid transparent;border-left:none;border-right:none;border-bottom:none;padding:10px 12px;font-size:11px;font-weight:500;white-space:nowrap;transition:color .2s,border-color .2s}
.tab:hover{color:#7a8fad}
.tab.active{color:#e8edf5;border-top-color:#ff6b35;font-weight:700}
.content{max-width:1100px;margin:0 auto;padding:18px 14px 60px}
.page{display:none}.page.active{display:block}

/* CARDS */
.card{background:#0f1623;border:1px solid #1a2438;border-radius:16px;padding:18px;transition:border-color .2s}
.card:hover{border-color:#243050}
.card-click{cursor:pointer;transition:border-color .2s,transform .15s}
.card-click:active{transform:scale(.98)}
.grad-card{border-radius:16px;padding:18px;border:1px solid}

/* BUTTONS */
.btn-primary{background:linear-gradient(135deg,#ff6b35,#ff4757);color:#07090f;border:none;border-radius:12px;padding:12px 20px;font-weight:700;font-size:14px;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px #ff6b3530}
.btn-primary:active{transform:scale(.97)}
.btn-ghost{background:rgba(255,255,255,.04);color:#7a8fad;border:1px solid #1a2438;border-radius:10px;padding:8px 14px;font-size:12px;transition:all .15s}
.btn-ghost:hover{background:rgba(255,255,255,.08);color:#e8edf5}

/* INPUTS */
.inp{background:#0d1220;border:1px solid #1a2438;border-radius:10px;color:#e8edf5;padding:10px 14px;font-size:13px;width:100%;transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:#ff6b3560;box-shadow:0 0 0 3px #ff6b3515}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid;white-space:nowrap}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:20px 16px;overflow-y:auto;animation:fadeIn .2s ease}
.modal-box{background:#0d1220;border-radius:20px;width:100%;max-width:600px;padding:24px;margin-top:20px;animation:slideUp .3s cubic-bezier(.2,.8,.2,1)}

/* PROGRESS BAR */
.bar-wrap{height:var(–h,5px);background:#1a2438;border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;animation:barIn .7s cubic-bezier(.2,.8,.2,1) both;transition:width .5s ease}

/* GRID HELPERS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.g7{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.flex{display:flex}.flex-col{flex-direction:column}.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}.gap16{gap:16px}
.wrap{flex-wrap:wrap}.center{align-items:center}.between{justify-content:space-between}.mb4{margin-bottom:4px}.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.f9{font-size:9px}.f10{font-size:10px}.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}.f14{font-size:14px}
.bold{font-weight:700}.bolder{font-weight:900}
.dim{color:#7a8fad}.muted{color:#334060}.text{color:#e8edf5}
.upper{text-transform:uppercase}.tracked{letter-spacing:.07em}
.bc{font-family:‘Barlow Condensed’,Arial}
</style>

</head>
<body>

<!-- SPLASH -->

<div id="splash">
  <div class="sp-logo float">⚡</div>
  <div class="sp-title">Dashboard Sport</div>
  <div class="sp-sub">27 ans · 71kg · Mars–Octobre 2025</div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
</div>

<!-- AMBIENT ORBS -->

<div class="ambient">
  <div class="orb" style="width:400px;height:400px;background:#ff6b35;top:-100px;right:-80px"></div>
  <div class="orb" style="width:280px;height:280px;background:#00d4ff;bottom:25%;left:-60px"></div>
  <div class="orb" style="width:200px;height:200px;background:#a3ff4f;bottom:-40px;right:18%"></div>
</div>

<div id="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <div class="flex between center mb10">
        <div>
          <div class="flex gap6 center mb4">
            <span style="background:linear-gradient(135deg,#ff6b35,#ff4757);color:#07090f;font-weight:900;font-size:9px;padding:2px 8px;border-radius:4px;font-family:'Barlow Condensed',Arial;letter-spacing:.08em">⚡ PRÉPA ATHLÈTE</span>
          </div>
          <h1 class="bc bolder upper" style="font-size:20px;letter-spacing:.04em">DASHBOARD SPORT</h1>
          <div class="f9 dim" style="margin-top:1px;letter-spacing:.03em">27 ans · 1m72 · 71kg · Mars–Oct 2025</div>
        </div>
        <div class="flex gap6">
          <div style="background:#00d4ff10;border:1px solid #00d4ff25;border-radius:10px;padding:6px 10px;text-align:center">
            <div class="bc bolder f14" style="color:#00d4ff">Sub 45'</div>
            <div class="f8 dim upper" style="letter-spacing:.06em;font-size:8px">10km</div>
          </div>
          <div style="background:#ff6b3510;border:1px solid #ff6b3525;border-radius:10px;padding:6px 10px;text-align:center">
            <div class="bc bolder f14" style="color:#ff6b35">Sub 1h15</div>
            <div class="f8 dim upper" style="letter-spacing:.06em;font-size:8px">Hyrox</div>
          </div>
        </div>
      </div>
      <div class="tabs" id="tabs"></div>
    </div>
  </div>

  <!-- PAGES -->

  <div class="content">
    <div class="page active" id="page-0"></div>
    <div class="page" id="page-1"></div>
    <div class="page" id="page-2"></div>
    <div class="page" id="page-3"></div>
    <div class="page" id="page-4"></div>
    <div class="page" id="page-5"></div>
    <div class="page" id="page-6"></div>
    <div class="page" id="page-7"></div>
    <div class="page" id="page-8"></div>
    <div class="page" id="page-9"></div>
    <div class="page" id="page-10"></div>
    <div class="page" id="page-11"></div>
  </div>
</div>

<!-- MODAL -->

<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
// ── STORAGE ──────────────────────────────────────────────────────────────────
const S = {
  get:(k)=>{try{return JSON.parse(localStorage.getItem(k)||'null');}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};
let checked   = S.get('sp_c')   ||{};
let pb        = S.get('sp_pb')  ||{};
let logs      = S.get('sp_logs')||[];
let notes     = S.get('sp_notes')||[];
let hydra     = S.get('sp_hydra')||{};
let goalP     = S.get('sp_goalp')||{};
let mealC     = S.get('sp_mealc')||{};
let progD     = S.get('sp_prog') ||{};

// ── COLORS / HELPERS ──────────────────────────────────────────────────────────
const C={bg:"#07090f",s1:"#0d1220",s2:"#121a2e",card:"#0f1623",border:"#1a2438",
  orange:"#ff6b35",cyan:"#00d4ff",lime:"#a3ff4f",red:"#ff4757",
  yellow:"#ffd32a",purple:"#a55eea",pink:"#ff6eb4",
  text:"#e8edf5",dim:"#7a8fad",muted:"#334060"};

const h=(tag,attrs={},children=[])=>{
  const el=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else if(k==='className') el.className=v;
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  children.forEach(c=>{
    if(c===null||c===undefined||c===false) return;
    if(typeof c==='string'||typeof c==='number') el.appendChild(document.createTextNode(c));
    else if(c instanceof Node) el.appendChild(c);
  });
  return el;
};
const div=(a,c)=>h('div',a,c);
const span=(a,c)=>h('span',a,c);
const btn=(a,c)=>h('button',a,c);

const today = new Date();
const todayKey = today.toISOString().split('T')[0];
const DAY_NAMES_FR = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const DAY_SHORT = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const MONTH_NAMES = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const isSameDay=(a,b)=>a.getDate()===b.getDate()&&a.getMonth()===b.getMonth()&&a.getFullYear()===b.getFullYear();
const formatFull=(d)=>d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function getWeekDates(ref){
  const d=new Date(ref),dow=d.getDay(),mon=new Date(d);
  mon.setDate(d.getDate()-(dow===0?6:dow-1));
  return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x;});
}

// ── PHASE / SESSION DATA ──────────────────────────────────────────────────────
const PHASE_RANGES=[
  {phase:0,start:new Date(2025,2,10),end:new Date(2025,5,15),label:"Phase 1",color:C.yellow,icon:"⚽"},
  {phase:1,start:new Date(2025,5,16),end:new Date(2025,7,31),label:"Phase 2",color:C.cyan,icon:"🏃"},
  {phase:2,start:new Date(2025,8,20),end:new Date(2025,8,20),label:"10KM",color:C.lime,icon:"🏁"},
  {phase:3,start:new Date(2025,8,22),end:new Date(2025,9,17),label:"Phase 3",color:C.orange,icon:"🔥"},
  {phase:4,start:new Date(2025,9,18),end:new Date(2025,9,18),label:"HYROX",color:C.red,icon:"🔥"},
];

function getPhase(date){
  for(const r of PHASE_RANGES){
    const d=new Date(date);d.setHours(12);
    if(d>=r.start&&d<=r.end)return r;
  }
  return null;
}

const DAY_SESSIONS={
  0:{
    1:{label:"FORCE HAUT",icon:"🏋️",color:C.orange,focus:"Gym haut du corps",duration:"60 min",blocks:[{title:"Échauffement",items:["Mobilité épaules 5 min","Tirages poulie 2×15","Band pull-apart 2×20"]},{title:"Force 80%",items:["Développé couché 4×5","Tractions 4×5","Rowing barre 4×6"]},{title:"Hypertrophie",items:["Dips 3×10","Curl haltères 3×10","Face pull 3×15"]},{title:"Core",items:["Planche 3×45s","Ab wheel 3×10"]}],note:"48h avant foot. Ne pas aller à l'échec."},
    2:{label:"RUN RÉCUP",icon:"🏃",color:C.cyan,focus:"Zone 2 facile",duration:"45 min",blocks:[{title:"Run facile",items:["6-8km Zone 2","FC 130-145 bpm","5'45-6'15/km"]},{title:"Mobilité",items:["Hanches 5 min","Foam roller 5 min"]}],note:"Zone 2 strict. Réduire si jambes lourdes."},
    3:{label:"HYROX INIT",icon:"🔥",color:C.lime,focus:"Stations Hyrox",duration:"70 min",blocks:[{title:"Warm-up",items:["Corde à sauter 5 min","2× KB swing + step-up"]},{title:"Circuit 2 rounds",items:["500m Ski Erg","1km run 4'45/km","25m Sled Push","50m Farmer carry 2×20kg","50m Burpee Jump"]},{title:"Finisher",items:["3×20 Wall Ball 6kg","500m Rowing"]}],note:"Technique avant performance."},
    4:{label:"FORCE BAS",icon:"🏋️",color:C.orange,focus:"Gym bas du corps",duration:"60 min",blocks:[{title:"Activation",items:["Hip thrust 2×20","Monster walk 2×15m","Goblet squat 2×10"]},{title:"Force",items:["Squat back 4×5 75-80%","SDT roumain 3×6"]},{title:"Fonctionnel",items:["Bulgarian split 3×8","Step-up 3×10","KB swing 3×15"]}],note:"Finir 24h avant foot vendredi."},
    5:{label:"FOOT",icon:"⚽",color:C.yellow,focus:"Entraînement football",duration:"90 min",blocks:[{title:"Avant",items:["Repas glucidique 2h avant","Hydratation 500ml","Activation 10 min"]},{title:"Post",items:["30g glucides + 25g protéines","Étirements 10 min"]}],note:"Zéro gym. Sommeil 8h minimum."},
    6:{label:"LONG RUN",icon:"🏃",color:C.cyan,focus:"Sortie longue",duration:"60-75 min",blocks:[{title:"12-15km",items:["3km échauffement 6'/km","6-9km endurance 5'30/km","3km retour progressif"]}],note:"Run le plus important. Ne jamais sauter."},
    0:{label:"MATCH",icon:"⚽",color:C.yellow,focus:"Match + récupération",duration:"Journée",blocks:[{title:"Post-match",items:["Shake recovery 30 min","Bain froid 10 min","Sommeil 8h"]}],note:"Récupération = entraînement."},
  },
  1:{
    1:{label:"REPOS ACTIF",icon:"😴",color:C.purple,focus:"Récupération",duration:"30 min",blocks:[{title:"Actif",items:["Yoga 20 min","Foam roller 10 min"]}],note:"Le corps progresse en récupérant."},
    2:{label:"FRACTIONNÉ",icon:"🏃",color:C.red,focus:"VMA / Seuil",duration:"60 min",blocks:[{title:"Seuil S1-4",items:["3km échauffement","4×1500m @ 4'28/km","Récup 2 min","2km retour"]},{title:"VMA S5-8",items:["8×400m @ VMA","Récup 90s trot"]},{title:"Race pace S9-11",items:["2×3km allure 10km","1km accélération"]}],note:"Séance dure. Pas de gym le lendemain."},
    3:{label:"FORCE LÉGÈRE",icon:"🏋️",color:C.orange,focus:"Maintenance",duration:"50 min",blocks:[{title:"Circuit 3 rounds",items:["Squat 3×5 @ 75%","Tractions 3×8","Développé couché 3×8","KB swing 3×15"]}],note:"Maintenance seulement."},
    4:{label:"RUN RÉCUP",icon:"🏃",color:C.cyan,focus:"Zone 2 doux",duration:"40 min",blocks:[{title:"Run doux",items:["6-8km Zone 2","FC < 145 bpm"]}],note:"Récupération du fractionné."},
    5:{label:"REPOS",icon:"😴",color:C.purple,focus:"Repos complet",duration:"Off",blocks:[{title:"Off",items:["Marche 20 min max","Étirements doux"]}],note:"Préserve les jambes pour samedi."},
    6:{label:"LONG RUN",icon:"🏃",color:C.cyan,focus:"Sortie longue allure",duration:"80-100 min",blocks:[{title:"Évolution",items:["S1-2: 16km facile","S3-5: 18km avec 8km allure","S6-8: 20km progression","S9-10: 16km décharge","S11: 10km très facile"]}],note:"Gel toutes les 45 min si +1h."},
    0:{label:"CROSS",icon:"🔥",color:C.lime,focus:"Endurance croisée",duration:"45 min",blocks:[{title:"Options",items:["Vélo 45 min Zone 2","Natation 2000m","Repos si fatigue"]}],note:"Choix selon ressenti."},
  },
  3:{
    1:{label:"REPOS ACTIF",icon:"😴",color:C.purple,focus:"Décompression",duration:"30 min",blocks:[{title:"Post 10km",items:["Mobilité 20 min","Pas de sport intense avant J+7"]}],note:"Récupérer du 10km."},
    2:{label:"FORCE HYROX",icon:"🏋️",color:C.orange,focus:"Force fonctionnelle",duration:"75 min",blocks:[{title:"Force",items:["Deadlift 4×4 @ 85%","Squat front 3×6","Rowing barre 4×6"]},{title:"Stations",items:["Farmer carry 4×40m (2×28kg)","Sled push 4×25m","Wall ball 4×25 (9kg)"]}],note:"Charges maximales."},
    3:{label:"RUN TRANSITIONS",icon:"🏃",color:C.cyan,focus:"Allure Hyrox",duration:"55 min",blocks:[{title:"Run Hyrox",items:["6×1km @ 4'30-4'45/km"]},{title:"Transitions",items:["5×: 200m sprint → 20 Wall Ball"]}],note:"Apprivoiser jambes lourdes."},
    4:{label:"SIMULATION",icon:"🔥",color:C.red,focus:"Simulation complète",duration:"80-100 min",blocks:[{title:"8 stations",items:["1km + Ski Erg 1000m","1km + Sled Push 50m","1km + Sled Pull 50m","1km + Burpee Jump 80m","1km + Rowing 1000m","1km + Farmer Carry 200m","1km + Sandbag Lunges 100m","1km + Wall Ball 100 reps"]}],note:"Séance reine. Note ton temps total."},
    5:{label:"RUN LÉGER",icon:"🏃",color:C.cyan,focus:"Récupération",duration:"40 min",blocks:[{title:"Doux",items:["6km Zone 2","FC < 140 bpm"]}],note:"Légèreté après simulation."},
    6:{label:"FORCE BAS",icon:"🏋️",color:C.orange,focus:"Jambes puissance",duration:"65 min",blocks:[{title:"Force",items:["Squat 5×4 @ 85%","SDT 3×4 @ 85%"]},{title:"Accessoires",items:["Fentes KB 3×12","Step-up 3×10","Leg curl 3×12"]}],note:"Jambes puissantes = sled + lunges."},
    0:{label:"LONG RUN",icon:"🏃",color:C.cyan,focus:"Endurance Hyrox",duration:"70 min",blocks:[{title:"14-16km",items:["S1-3: 14km facile","S4-5: 16km avec 4km allure Hyrox","S6: 10km très facile"]}],note:"Ne pas descendre sous 25 km/sem."},
  },
};

function getSession(date){
  const phase=getPhase(date);
  if(!phase)return null;
  const sessions=DAY_SESSIONS[phase.phase];
  if(!sessions)return null;
  return sessions[date.getDay()]||null;
}

const STATIONS=[
  {name:"Ski Erg",dist:"1000m",tips:"55 coups/min. Poussée hanches, bras raides.",target:"3'45",color:C.cyan},
  {name:"Sled Push",dist:"50m",tips:"Hanche basse, pas courts rapides.",target:"1'45",color:C.orange},
  {name:"Sled Pull",dist:"50m",tips:"Tirage vertical, gainage maximal.",target:"2'00",color:C.orange},
  {name:"Burpee Jump",dist:"80m",tips:"Explosivité sur le saut. Rythme régulier.",target:"4'00",color:C.red},
  {name:"Rowing",dist:"1000m",tips:"Jambes d'abord. Drive fort. 85-90% FCmax.",target:"3'40",color:C.cyan},
  {name:"Farmer Carry",dist:"200m",tips:"2×24kg min. Gainage maximal.",target:"2'30",color:C.lime},
  {name:"Sandbag Lunges",dist:"100m",tips:"Sac sur épaule. Genou au sol. Alterner.",target:"5'00",color:C.yellow},
  {name:"Wall Ball",dist:"100 reps",tips:"Squat profond. 15 reps pause 5s.",target:"7'00",color:C.purple},
];

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function mkTag(text,color){
  return span({className:'tag',style:{color,borderColor:color+'50',background:color+'12'}},text);
}
function mkCard(content,style={}){
  const c=div({className:'card',style});
  if(typeof content==='string') c.innerHTML=content;
  else if(Array.isArray(content)) content.forEach(x=>x&&c.appendChild(x));
  else if(content instanceof Node) c.appendChild(content);
  return c;
}
function mkSection(title,subtitle=''){
  return div({className:'mb16'},[
    h('h2',{className:'bc bolder upper',style:{fontSize:'22px',letterSpacing:'.03em',margin:0}},title),
    subtitle&&div({className:'dim f12',style:{marginTop:'3px'}},subtitle),
  ]);
}
function mkBar(pct,color,height='5px'){
  const w=div({className:'bar-wrap',style:{'--h':height}});
  const f=div({className:'bar-fill',style:{width:pct+'%','--w':pct+'%',background:color,boxShadow:`0 0 8px ${color}60`}});
  w.appendChild(f);
  return w;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(content){
  const box=document.getElementById('modal-box');
  box.innerHTML='';
  if(Array.isArray(content)) content.forEach(x=>x&&box.appendChild(x));
  else box.appendChild(content);
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}

function sessionModal(session,date){
  const box=div({className:'modal-box',style:{border:`1px solid ${session.color}40`}},[
    div({className:'flex between center mb8'},[
      div({},[
        div({className:'f10 dim upper tracked mb4'},date?formatFull(date):''),
        h('h3',{className:'bc bolder upper',style:{fontSize:'24px',color:session.color,margin:0,letterSpacing:'.03em'}},session.icon+' '+session.label),
      ]),
      btn({className:'btn-ghost',style:{padding:'6px 10px',fontSize:'16px'},onClick:closeModal},'✕'),
    ]),
    div({className:'flex gap6 mb16 wrap'},[
      mkTag('⏱ '+session.duration,session.color),
      mkTag(session.focus,session.color),
    ]),
    ...session.blocks.map(b=>div({style:{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:'12px',padding:'12px 16px',marginBottom:'10px'}},[

  openModal(box);

// ── TAB 8: STATS ─────────────────────────────────────────────────────────────
function renderStats(){
  const wrap=div({className:'slide-up fade-in'});

  const totalSessions=logs.length;
  // Streak calc
  const logDates=[...new Set(logs.map(l=>l.date))].sort();
  let streakMax=0,cur=0;
  for(let i=logDates.length-1;i>=0;i--){
    if(i===logDates.length-1){const diff=Math.round((new Date(today)-new Date(logDates[i]))/864e5);if(diff<=1){cur=1;}else break;}
    else{const diff=Math.round((new Date(logDates[i+1])-new Date(logDates[i]))/864e5);if(diff===1)cur++;else{if(cur>streakMax)streakMax=cur;cur=0;}}

function renderNotes(){
  const wrap=div({className:'slide-up fade-in'});
  const NOTE_TAGS=[{id:'general',label:'Général',icon:'📝',color:C.dim},{id:'blessure',label:'Blessure',icon:'🤕',color:C.red},{id:'sensation',label:'Sensation',icon:'💡',color:C.yellow},{id:'nutrition',label:'Nutrition',icon:'🥗',color:C.lime},{id:'mental',label:'Mental',icon:'🧠',color:C.purple},{id:'pr',label:'Record',icon:'🏆',color:C.orange}];

  const addBtn=btn({className:'btn-primary',style:{padding:'10px 16px',fontSize:'13px'},onClick:toggleForm},'+ Note');
  hdr.appendChild(addBtn);
  wrap.appendChild(hdr);

  const formDiv=div({style:{display:'none',marginBottom:'16px'}});
  let noteText='',noteDate=todayKey;

  function buildNoteForm(){
    formDiv.innerHTML='';
    const card=mkCard([]);
    card.style.border=`1px solid ${C.orange}40`;
    const tagRow=div({className:'flex gap5 wrap mb12'});
    NOTE_TAGS.forEach(t=>{
      tagRow.appendChild(btn({style:{background:noteTag===t.id?t.color:C.s1,color:noteTag===t.id?C.bg:C.dim,border:`1px solid ${noteTag===t.id?t.color:C.border}`,borderRadius:'20px',padding:'4px 10px',fontSize:'11px',fontWeight:'700'},onClick:()=>{noteTag=t.id;buildNoteForm();}},t.icon+' '+t.label));
    });
    card.appendChild(tagRow);
    const dateInp=h('input',{className:'inp mb10',type:'date'});dateInp.value=noteDate;dateInp.addEventListener('change',e=>noteDate=e.target.value);
    card.appendChild(dateInp);
    const ta=h('textarea',{className:'inp mb12',rows:'4',placeholder:'Ta note... (blessure, sensation, PR, observation)'});ta.value=noteText;ta.addEventListener('input',e=>noteText=e.target.value);
    card.appendChild(ta);

      if(!noteText.trim())return;
      notes=[{text:noteText,tag:noteTag,date:noteDate,id:Date.now()},...notes];
      S.set('sp_notes',notes);noteText='';renderPage(9);
    }},'✓ Enregistrer'));
    formDiv.appendChild(card);
  }

  function toggleForm(){if(formDiv.style.display==='none'){buildNoteForm();formDiv.style.display='block';addBtn.textContent='✕ Annuler';}else{formDiv.style.display='none';addBtn.textContent='+ Note';}}
  wrap.appendChild(formDiv);

  const filtered=noteFilter==='all'?notes:notes.filter(n=>n.tag===noteFilter);
  if(!notes.length){wrap.appendChild(mkCard([div({style:{textAlign:'center',padding:'24px'}},[div({style:{fontSize:'28px',marginBottom:'8px'}},'🗒️'),div({className:'dim f13'},"Aucune note. Clique sur + Note !")])]));return wrap;}

  const list=div({className:'flex flex-col gap8'});
  filtered.forEach(n=>{
    const tag=NOTE_TAGS.find(t=>t.id===n.tag)||NOTE_TAGS[0];
    const card=mkCard([]);card.style.borderLeft=`3px solid ${tag.color}`;
    const top=div({className:'flex between center mb6'});
    top.appendChild(div({className:'flex center gap6'},[span({style:{background:tag.color+'18',color:tag.color,border:`1px solid ${tag.color}30`,borderRadius:'20px',padding:'2px 8px',fontSize:'10px',fontWeight:'700'}},tag.icon+' '+tag.label),span({className:'f10 muted'},n.date)]));
    top.appendChild(btn({style:{background:'none',border:'none',color:C.muted,fontSize:'16px',cursor:'pointer'},onClick:()=>{notes=notes.filter(x=>x.id!==n.id);S.set('sp_notes',notes);renderPage(9);}},'✕'));
    card.appendChild(top);
    card.appendChild(div({style:{fontSize:'13px',color:C.text,lineHeight:'1.7',whiteSpace:'pre-wrap'}},n.text));
    list.appendChild(card);
  });
  wrap.appendChild(list);
  return wrap;
}

// ── TAB 11: PROGRÈS ──────────────────────────────────────────────────────────
function renderProgres(){
  const wrap=div({className:'slide-up fade-in'});
  wrap.appendChild(mkSection('PROGRESSION','Compare tes perfs de départ vs aujourd\'hui'));
  wrap.appendChild(div({style:{background:`linear-gradient(135deg,${C.orange}20,${C.cyan}10)`,border:'1px solid rgba(255,107,53,.25)',borderRadius:'16px',padding:'18px 20px',marginBottom:'20px',display:'flex',alignItems:'center',gap:'14px'}},[
    div({style:{fontSize:'36px'}},'📈'),
    div({},[div({className:'bold f13 mb4'},'Saisis tes valeurs de départ (Mars 2025) et actuelles'),div({className:'dim f11'},'La progression s\'affiche automatiquement')]),
  ]));
  const METRICS=[
    {key:'allure',label:'Allure 10km',icon:'🏃',color:C.cyan,unit:'/km',placeholder:"ex: 5'45"},
    {key:'hyrox_t',label:'Temps Hyrox',icon:'🔥',color:C.orange,unit:'',placeholder:'ex: 1h30'},
    {key:'squat',label:'Squat',icon:'🏋️',color:C.lime,unit:'kg',placeholder:'ex: 80'},
    {key:'deadlift',label:'Deadlift',icon:'🏋️',color:C.red,unit:'kg',placeholder:'ex: 100'},
    {key:'bench',label:'Bench press',icon:'🏋️',color:C.yellow,unit:'kg',placeholder:'ex: 70'},
    {key:'poids',label:'Poids corporel',icon:'⚖️',color:C.purple,unit:'kg',placeholder:'ex: 73'},
    {key:'skierg',label:'Ski Erg 1000m',icon:'🎿',color:C.cyan,unit:'',placeholder:"ex: 4'10"},
    {key:'vma',label:'VMA estimée',icon:'⚡',color:C.pink,unit:'km/h',placeholder:'ex: 14'},
  ];

  const col=div({className:'flex flex-col gap12'});
  METRICS.forEach(m=>{
    const sv=progD[m.key+'_start']||'';
    const nv=progD[m.key+'_now']||'';
    const sNum=parseFloat(sv),nNum=parseFloat(nv);
    const hasNum=!isNaN(sNum)&&!isNaN(nNum)&&sNum!==0;
    const isDown=m.unit==='/km'||m.key==='skierg'||m.key==='hyrox_t'||m.key==='poids';
    const diff=hasNum?Math.round((nNum-sNum)*100)/100:null;
    const pct=hasNum?Math.round(((nNum-sNum)/sNum)*100):null;
    const better=diff!==null?(isDown?diff<0:diff>0):null;

    const card=mkCard([]);
    card.style.borderLeft=`3px solid ${m.color}`;
    const top=div({className:'flex between mb12'});
    top.appendChild(div({},[div({className:'f11 dim mb2'},m.icon+' '+m.label),div({className:'bc bolder upper',style:{fontSize:'17px',color:m.color}},m.label)]));
    if(diff!==null){
      const badge=div({style:{background:better?C.lime+'15':C.red+'15',border:`1px solid ${better?C.lime:C.red}30`,borderRadius:'8px',padding:'4px 10px',textAlign:'center'}});
      badge.appendChild(div({className:'bold',style:{fontSize:'14px',color:better?C.lime:C.red}},(better?'▲ ':'▼ ')+(diff>0?'+':'')+diff+m.unit));
      badge.appendChild(div({className:'f9 dim'},(pct>0?'+':'')+pct+'%'));
      top.appendChild(badge);
    }
    card.appendChild(top);
    const inpGrid=div({className:'g2'});
    // Start
    const startWrap=div({});
    startWrap.appendChild(div({className:'f9 dim upper tracked mb4'},'🟡 Départ (Mars)'));
    const startInp=h('input',{className:'inp',placeholder:m.placeholder,style:{fontSize:'14px',fontWeight:'700',textAlign:'center',padding:'10px 8px'}});
    startInp.value=sv;
    startInp.addEventListener('input',e=>{progD[m.key+'_start']=e.target.value;S.set('sp_prog',progD);});
    startWrap.appendChild(startInp);
    inpGrid.appendChild(startWrap);
    // Now
    const nowWrap=div({});
    nowWrap.appendChild(div({className:'f9 upper tracked mb4',style:{color:m.color}},'🟢 Maintenant'));
    const nowInp=h('input',{className:'inp',placeholder:m.placeholder,style:{fontSize:'14px',fontWeight:'700',textAlign:'center',padding:'10px 8px',borderColor:nv?m.color+'50':undefined}});
    nowInp.value=nv;
    nowInp.addEventListener('input',e=>{progD[m.key+'_now']=e.target.value;S.set('sp_prog',progD);});
    nowWrap.appendChild(nowInp);
    inpGrid.appendChild(nowWrap);
    card.appendChild(inpGrid);
    if(better===true) card.appendChild(div({className:'bold f11',style:{color:C.lime,marginTop:'8px'}},'🔥 En progression — continue !'));
    col.appendChild(card);
  });
  wrap.appendChild(col);
  return wrap;
}

let currentTab=0;

function renderPage(i){
  const page=document.getElementById('page-'+i);
  if(!page)return;
  page.innerHTML='';
  page.appendChild(TABS[i].render());
}

function switchTab(i){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+i).classList.add('active');
  document.querySelectorAll('.tab')[i].classList.add('active');
  if(!document.getElementById('page-'+i).children.length) renderPage(i);
  currentTab=i;
}

// Build tabs
const tabsEl=document.getElementById('tabs');
TABS.forEach((t,i)=>{
  const b=btn({className:'tab'+(i===0?' active':''),onClick:()=>switchTab(i)},t.label);
  tabsEl.appendChild(b);
});

// Render first page
renderPage(0);

// Splash dismiss
setTimeout(()=>{
  const s=document.getElementById('splash');
  if(s){s.classList.add('hide');setTimeout(()=>{if(s.parentNode)s.remove();},700);}
},800);
