<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:#07090f;
  color:#e8edf5;
  font-family:'DM Sans',sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#243050;border-radius:10px}
button,input,textarea,select{font-family:'DM Sans',sans-serif;cursor:pointer}
textarea{resize:none}

/* ── SPLASH ─────────────────────────────────────────── */
#splash{
position:fixed;inset:0;z-index:9999;
background:#07090f;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
transition:opacity 0.6s ease, transform 0.6s ease;
}
#splash.hide{opacity:0;transform:scale(1.05);pointer-events:none}
.splash-logo{
width:90px;height:90px;border-radius:24px;
background:linear-gradient(135deg,#ff6b35,#ff4757);
display:flex;align-items:center;justify-content:center;
font-size:44px;
box-shadow:0 0 60px #ff6b3560, 0 0 120px #ff475730;
animation:splashPop 0.7s cubic-bezier(.175,.885,.32,1.275) both;
}
.splash-title{
font-family:‘Barlow Condensed’,Arial;
font-size:32px;font-weight:900;color:#e8edf5;
letter-spacing:0.08em;text-transform:uppercase;
margin-top:20px;
animation:splashFade 0.5s 0.3s ease both;
}
.splash-sub{
font-size:12px;color:#7a8fad;margin-top:6px;
animation:splashFade 0.5s 0.5s ease both;
}
.splash-bar{
width:120px;height:2px;background:#1a2438;
border-radius:2px;margin-top:32px;overflow:hidden;
animation:splashFade 0.5s 0.5s ease both;
}
.splash-bar-fill{
height:100%;background:linear-gradient(90deg,#ff6b35,#00d4ff);
border-radius:2px;
animation:splashLoad 1.2s 0.4s ease-out both;
}

/* ── ANIMATIONS ─────────────────────────────────────── */
@keyframes splashPop{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
@keyframes splashFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes splashLoad{from{width:0}to{width:100%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes glow{0%,100%{box-shadow:0 0 8px currentColor}50%{box-shadow:0 0 20px currentColor, 0 0 40px currentColor}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes countUp{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes barFill{from{width:0%}to{width:var(–w)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

.slide-up{animation:slideUp 0.35s cubic-bezier(.2,.8,.2,1) both}
.slide-up-1{animation:slideUp 0.35s 0.05s cubic-bezier(.2,.8,.2,1) both}
.slide-up-2{animation:slideUp 0.35s 0.10s cubic-bezier(.2,.8,.2,1) both}
.slide-up-3{animation:slideUp 0.35s 0.15s cubic-bezier(.2,.8,.2,1) both}
.fade-in{animation:fadeIn 0.4s ease both}
.live-dot{animation:pulse 2s infinite}
.float{animation:float 3s ease-in-out infinite}

/* ── GLASSMORPHISM CARDS ─────────────────────────────── */
.glass{
background:rgba(15,22,35,0.85);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.06);
}
.glass-bright{
background:rgba(18,26,46,0.9);
backdrop-filter:blur(16px);
-webkit-backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,0.08);
}

/* ── AMBIENT BACKGROUND ─────────────────────────────── */
.ambient{
position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
}
.ambient-orb{
position:absolute;border-radius:50%;filter:blur(80px);opacity:0.07;
}

/* ── PROGRESS BARS ───────────────────────────────────── */
.bar-animated{
height:100%;border-radius:inherit;
animation:barFill 0.8s cubic-bezier(.2,.8,.2,1) both;
}

/* ── TABS ────────────────────────────────────────────── */
.tab-btn{
background:transparent;
color:#334060;
border-top:2px solid transparent;
border-left:none;border-right:none;border-bottom:none;
padding:10px 12px;
font-weight:500;font-size:11px;
white-space:nowrap;
transition:color 0.2s, border-color 0.2s;
letter-spacing:0.02em;
}
.tab-btn:hover{color:#7a8fad}
.tab-btn.active{
color:#e8edf5;
border-top-color:#ff6b35;
font-weight:700;
}

/* ── CARDS ───────────────────────────────────────────── */
.card{
background:#0f1623;
border:1px solid #1a2438;
border-radius:16px;
padding:18px;
transition:border-color 0.2s, transform 0.15s;
}
.card:hover{border-color:#243050}
.card-hover:active{transform:scale(0.98)}

/* ── BUTTONS ─────────────────────────────────────────── */
.btn-primary{
background:linear-gradient(135deg,#ff6b35,#ff4757);
color:#07090f;border:none;border-radius:12px;
padding:12px 20px;font-weight:700;font-size:14px;
transition:transform 0.15s, box-shadow 0.15s;
box-shadow:0 4px 20px #ff6b3530;
}
.btn-primary:active{transform:scale(0.97)}
.btn-primary:hover{box-shadow:0 4px 30px #ff6b3550}

.btn-ghost{
background:rgba(255,255,255,0.04);
color:#7a8fad;border:1px solid #1a2438;
border-radius:10px;padding:8px 14px;
font-weight:500;font-size:12px;
transition:all 0.15s;
}
.btn-ghost:hover{background:rgba(255,255,255,0.07);color:#e8edf5}

/* ── INPUTS ──────────────────────────────────────────── */
.inp{
background:#0d1220;
border:1px solid #1a2438;
border-radius:10px;color:#e8edf5;
padding:10px 14px;font-size:13px;
width:100%;outline:none;
transition:border-color 0.2s, box-shadow 0.2s;
}
.inp:focus{border-color:#ff6b3560;box-shadow:0 0 0 3px #ff6b3515}

/* ── TAG CHIPS ───────────────────────────────────────── */
.tag{
display:inline-flex;align-items:center;gap:4px;
padding:3px 10px;border-radius:20px;
font-size:10px;font-weight:700;
white-space:nowrap;
border:1px solid currentColor;
opacity:0.9;
}

/* ── SHIMMER LOADING ─────────────────────────────────── */
.shimmer{
background:linear-gradient(90deg,#1a2438 25%,#243050 50%,#1a2438 75%);
background-size:200% auto;
animation:shimmer 1.5s infinite;
}

/* ── STAT NUMBER ─────────────────────────────────────── */
.stat-num{
font-family:‘Barlow Condensed’,Arial;
font-size:38px;font-weight:900;line-height:1;
animation:countUp 0.5s cubic-bezier(.2,.8,.2,1) both;
}

/* ── BADGE CARD ──────────────────────────────────────── */
.badge-unlocked{
position:relative;overflow:hidden;
transition:transform 0.2s;
}
.badge-unlocked::before{
content:’’;position:absolute;inset:0;
background:linear-gradient(135deg,rgba(255,255,255,0.04),transparent);
border-radius:inherit;
}
.badge-unlocked:hover{transform:translateY(-2px)}

/* ── MODAL ───────────────────────────────────────────── */
.modal-overlay{
position:fixed;inset:0;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);
z-index:1000;
display:flex;align-items:flex-start;justify-content:center;
padding:20px 16px;overflow-y:auto;
animation:fadeIn 0.2s ease;
}
.modal-content{
background:#0d1220;
border-radius:20px;
width:100%;max-width:600px;
padding:24px;margin-top:20px;
animation:slideUp 0.3s cubic-bezier(.2,.8,.2,1);
}

/* ── HEADER ──────────────────────────────────────────── */
.header{
position:sticky;top:0;z-index:100;
background:rgba(7,9,15,0.92);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.05);
}

/* ── SCROLLABLE TABS ─────────────────────────────────── */
.tabs-scroll{
display:flex;overflow-x:auto;
scrollbar-width:none;
}
.tabs-scroll::-webkit-scrollbar{display:none}
</style>

</head>

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getPhaseForDate(date) {
for (const r of PHASE_RANGES) {
const d = new Date(date); d.setHours(12);
const s = new Date(r.start); const e = new Date(r.end);
if (d >= s && d <= e) return r;
}
// Before start
if (date < PHASE_RANGES[0].start) return null;
// Between phases - find closest upcoming
return null;
}

function getSessionForDate(date) {
const phase = getPhaseForDate(date);
if (!phase) return null;
const dow = date.getDay(); // 0=Sun, 1=Mon…
const sessions = DAY_SESSIONS[phase.phase];
if (!sessions) return null;
return sessions[dow] || null;
}

function getWeekDates(referenceDate) {
const d = new Date(referenceDate);
const day = d.getDay();
const monday = new Date(d);
monday.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
const week = [];
for (let i = 0; i < 7; i++) {
const dd = new Date(monday);
dd.setDate(monday.getDate() + i);
week.push(dd);
}
return week;
}

function formatDate(d) {
return d.toLocaleDateString(‘fr-FR’, {weekday:‘short’, day:‘numeric’, month:‘short’});
}

function formatFullDate(d) {
return d.toLocaleDateString(‘fr-FR’, {weekday:‘long’, day:‘numeric’, month:‘long’, year:‘numeric’});
}

function isSameDay(a, b) {
return a.getDate()===b.getDate() && a.getMonth()===b.getMonth() && a.getFullYear()===b.getFullYear();
}

function getDayLabel(i) {
return [‘Dim’,‘Lun’,‘Mar’,‘Mer’,‘Jeu’,‘Ven’,‘Sam’][i];
}

  const diff = Math.round((prev - d)/(1000*60*60*24));
  if (i === logDates.length-1) {
    const diffToday = Math.round((new Date(today) - d)/(1000*60*60*24));
    if (diffToday <= 1) { cur = 1; streak = 1; }
    else break;
  } else {
    if (diff === 1) { cur++; streak = cur; }
    else { if(cur > streakMax) streakMax = cur; cur = 0; }
  }
}
